<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</head>

<body>
    <header id="header">
        <img src="logo.png" alt="Tim Hortons Logo">

    </header>
    <h1>Select the Location:</h1>
    <select name="location" id="location">
      
    </select>
   
    <ol id="menuList"></ol>

    <h1>Order Processing</h1>
    <div>
        
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">
        <label for="">Item ordered:</label>
        <select name="items" id="items">
           
        </select>

        <label for="">How many items:</label>
        <input type="number" id="quantity" name="quantity">

        <label for="">How would you like to pay [credit/debit/cash]:</label>
        <select name="payment" id="payment">
            <option value="sel">Select a payment method: </option>
            <option value="Credit">Credit</option>
            <option value="Debit">Debit</option>
            <option value="Cash">Cash</option>
        </select>

        <button type="button" id="orderButton">Place Order</button>
    </div>

    <h1>Order Details</h1>
    <div id="output">

    </div>
</body>

</html>
