<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tim Hortons Orders</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

    <h1 id="header">Tim Hortons</h1>

    <div class="container">

        <!-- Customer ID -->
        <div class="form-group">
            <label>Customer ID:</label>
            <input type="number" id="customerId" placeholder="Enter your ID">
        </div>

        <!-- Location -->
        <div class="form-group">
            <label>Location:</label>
            <select id="location">
                <option>Loading...</option>
            </select>
        </div>

        <!-- Button -->
        <button id="getOrdersBtn">Get Orders</button>

    </div>

    <!-- Message -->
    <div id="message"></div>

    <!-- Table -->
    <table id="ordersTable">
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Item</th>
                <th>Quantity</th>
                <th>Payment</th>
                <th>Price</th> <!-- 🔥 si tu affiches UnitPrice -->
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
